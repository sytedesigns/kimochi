<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kimochi · Menu Page Explorations</title>

  <link rel="stylesheet" href="hero-styles.css" />
  <link rel="stylesheet" href="menu-styles.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html, body { margin: 0; padding: 0; background: #F4EDE7; height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script src="image-slot.js"></script>
  <script type="text/babel" src="hero-components.jsx"></script>
  <script type="text/babel" src="menu-data.jsx"></script>
  <script type="text/babel" src="menu-components.jsx"></script>
  <script type="text/babel" src="specialty-components.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "caffeineColor": "rose",
      "density": "comfy"
    }/*EDITMODE-END*/;

    const ACCENTS = {
      rose:   "#C87878",
      matcha: "#005B6E",
      mango:  "#C8902A",
    };

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => {
        document.documentElement.style.setProperty("--accent-highlight", ACCENTS[t.caffeineColor] || ACCENTS.rose);
      }, [t.caffeineColor]);

      React.useEffect(() => {
        document.documentElement.style.setProperty("--mp-density-gap",
          t.density === "compact" ? "6px" : t.density === "regular" ? "10px" : "14px");
      }, [t.density]);

      return (
        <>
          <style>{`
            .mpA__items { gap: var(--mp-density-gap, 12px) 32px; }
            .mpB__flavors { gap: var(--mp-density-gap, 8px); }
            .mpC__list { gap: calc(var(--mp-density-gap, 8px) * 0.4) 14px; }
          `}</style>

          <DesignCanvas
            title="Kimochi · Menu page"
            subtitle="Three menu layouts — a quiet editorial column, a buildable card grid, and a faithful homage to your menu board."
          >
            <DCSection
              id="menus"
              title="Menu directions"
              subtitle="1440 wide · scrolls vertically — same content, three voices"
            >
              <DCArtboard id="A" label="A · Editorial column" width={1440} height={3060}>
                <MenuA tweaks={t} />
              </DCArtboard>
              <DCArtboard id="B" label="B · Buildable card grid" width={1440} height={1980}>
                <MenuB tweaks={t} />
              </DCArtboard>
              <DCArtboard id="C" label="C · Poster homage" width={1440} height={1260}>
                <MenuC tweaks={t} />
              </DCArtboard>
            </DCSection>

            <DCSection
              id="specialty"
              title="Specialty Drink Series"
              subtitle="1440 wide · seasonal showcase — signature builds + the espresso bar. Drop real product photos into the slots."
            >
              <DCArtboard id="SP" label="Seasonal showcase" width={1440} height={1960}>
                <SpecialtyShowcase tweaks={t} />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Caffeine indicator" />
            <TweakColor
              label="Marker color"
              value={t.caffeineColor}
              options={['#C87878', '#005B6E', '#C8902A']}
              onChange={(v) => {
                const key = v === '#005B6E' ? 'matcha' : v === '#C8902A' ? 'mango' : 'rose';
                setTweak('caffeineColor', key);
              }}
            />
            <TweakSection label="List density" />
            <TweakRadio
              label="Spacing"
              value={t.density}
              options={['compact','regular','comfy']}
              onChange={(v) => setTweak('density', v)}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
