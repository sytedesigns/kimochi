<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kimochi · Hero Page Explorations</title>

  <link rel="stylesheet" href="hero-styles.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    /* Page background behind the canvas — quiet warm cream */
    html, body { margin: 0; padding: 0; background: #F4EDE7; height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="hero-components.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "rose",
      "showScript": true,
      "headline": "default"
    }/*EDITMODE-END*/;

    const ACCENTS = {
      rose:   { highlight: "#C87878", highlightSoft: "#F2DADA" },
      matcha: { highlight: "#005B6E", highlightSoft: "#D0E4E0" },
      blush:  { highlight: "#9E4C4C", highlightSoft: "#F2EAE8" },
    };

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // Inject accent overrides as CSS vars on :root so every artboard updates
      React.useEffect(() => {
        const a = ACCENTS[t.accent] || ACCENTS.rose;
        document.documentElement.style.setProperty("--accent-highlight", a.highlight);
        document.documentElement.style.setProperty("--color-rose", a.highlight);
        document.documentElement.style.setProperty("--color-rose-light", a.highlightSoft);
        document.documentElement.style.setProperty("--hp-script-display", t.showScript ? "inline-block" : "none");
      }, [t.accent, t.showScript]);

      return (
        <>
          <style>{`
            /* live-tweak overrides */
            .hpA__stamp__script, .hpC__title .script, .hpB__script, .hpC__medallion__script {
              display: var(--hp-script-display, inline-block);
            }
          `}</style>

          <DesignCanvas
            title="Kimochi · Hero page"
            subtitle="Three directions for the homepage hero — pick one to refine, or mix the best parts."
          >
            <DCSection
              id="heroes"
              title="Hero directions"
              subtitle="1440 × 900 — full desktop hero region with sticky header"
            >
              <DCArtboard id="A" label="A · Editorial quiet" width={1440} height={900}>
                <HeroA tweaks={t} />
              </DCArtboard>
              <DCArtboard id="B" label="B · Photo-forward" width={1440} height={900}>
                <HeroB tweaks={t} />
              </DCArtboard>
              <DCArtboard id="C" label="C · Script medallion + menu peek" width={1440} height={900}>
                <HeroC tweaks={t} />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Accent" />
            <TweakColor
              label="Script color"
              value={t.accent}
              options={[
                ['#C87878', '#F2DADA'],
                ['#005B6E', '#D0E4E0'],
                ['#9E4C4C', '#F2EAE8'],
              ]}
              onChange={(v) => {
                // map palette array back to key
                const hex = v[0];
                const key = hex === '#005B6E' ? 'matcha' : hex === '#9E4C4C' ? 'blush' : 'rose';
                setTweak('accent', key);
              }}
            />
            <TweakSection label="Composition" />
            <TweakToggle
              label="Show ハッピー / script flourish"
              value={t.showScript}
              onChange={(v) => setTweak('showScript', v)}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
